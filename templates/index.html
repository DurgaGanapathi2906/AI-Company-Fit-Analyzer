```html
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Company Fit Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5 mb-5">

    <div class="card shadow-lg main-card">

        <!-- HERO HEADER -->

        <div class="card-header bg-primary text-white text-center p-5">

            <h1 class="display-5 fw-bold">

                <i class="bi bi-robot"></i>

                AI Company Fit Analyzer

            </h1>

            <p class="fs-5 mt-3">

                AI-Powered Placement Readiness,
                Resume Intelligence &
                Company Match Prediction Platform

            </p>

        </div>

        <!-- FORM SECTION -->

        <div class="card-body p-5">

            <form method="POST"
                  action="/analyze"
                  enctype="multipart/form-data">

                <!-- NAME -->

                <div class="mb-4">

                    <label class="form-label fw-bold">

                        <i class="bi bi-person-fill"></i>

                        Student Name

                    </label>

                    <input type="text"
                           class="form-control"
                           name="name"
                           placeholder="Enter your full name"
                           required>

                </div>

                <!-- CGPA -->

                <div class="mb-4">

                    <label class="form-label fw-bold">

                        <i class="bi bi-mortarboard-fill"></i>

                        CGPA

                    </label>

                    <input type="number"
                           step="0.1"
                           class="form-control"
                           name="cgpa"
                           placeholder="Example: 8.5"
                           required>

                </div>

                <!-- BRANCH -->

                <div class="mb-4">

                    <label class="form-label fw-bold">

                        <i class="bi bi-book-fill"></i>

                        Branch

                    </label>

                    <input type="text"
                           class="form-control"
                           name="branch"
                           placeholder="CSE AIML"
                           required>

                </div>

                <!-- SKILLS -->

                <div class="mb-4">

                    <label class="form-label fw-bold">

                        <i class="bi bi-tools"></i>

                        Skills (Optional)

                    </label>

                    <input type="text"
                           class="form-control"
                           name="skills"
                           placeholder="Python, SQL, Java, Machine Learning">

                    <small class="text-muted">

                        Leave blank if uploading a resume.

                    </small>

                </div>

                <!-- RESUME -->

                <div class="mb-4">

                    <label class="form-label fw-bold">

                        <i class="bi bi-file-earmark-pdf-fill"></i>

                        Upload Resume (PDF)

                    </label>

                    <input type="file"
                           class="form-control"
                           name="resume"
                           accept=".pdf">

                </div>

                <!-- COMPANY -->

                <div class="mb-4">

                    <label class="form-label fw-bold">

                        <i class="bi bi-building"></i>

                        Target Company

                    </label>

                    <select class="form-select"
                            name="company">

                        <option value="Amazon">
                            Amazon
                        </option>

                        <option value="Microsoft">
                            Microsoft
                        </option>

                        <option value="Infosys">
                            Infosys
                        </option>

                        <option value="TCS Digital">
                            TCS Digital
                        </option>

                        <option value="Accenture">
                            Accenture
                        </option>

                    </select>

                </div>

                <!-- BUTTON -->

                <div class="text-center mt-5">

                    <button type="submit"
                            class="btn btn-success btn-lg px-5">

                        <i class="bi bi-search"></i>

                        Analyze My Profile

                    </button>

                </div>

            </form>

        </div>

        <!-- FOOTER -->

        <div class="card-footer text-center">

            <strong>

                Built Using

            </strong>

            <br>

            Python • Flask • MySQL • PDFPlumber • Gemini AI

        </div>

    </div>

</div>

</body>

</html>
```
